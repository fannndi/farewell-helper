<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>farewell-helper v5 — architecture atlas</title>
<style>
:root {
  --bg: oklch(0.12 0.012 255);
  --panel: oklch(0.16 0.014 255);
  --panel-raised: oklch(0.20 0.016 255);
  --ink: oklch(0.95 0.008 255);
  --muted: oklch(0.69 0.018 255);
  --line: oklch(0.31 0.018 255);
  --primary: oklch(0.65 0.18 35.8);
  --accent: oklch(0.76 0.15 142);
  --danger: oklch(0.64 0.20 25);
  --blue: oklch(0.62 0.14 260);
  --purple: oklch(0.64 0.16 300);
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--ink);
  display: flex; overflow: hidden;
  font-size: 13px;
}
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--line); border-radius:2px; }

/* ── Rail ── */
#rail {
  width: 280px; min-width: 280px;
  background: var(--panel);
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  overflow: hidden;
}
#rail-header {
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--line);
}
#rail-header h1 { font-size: 15px; font-weight: 600; color: var(--ink); letter-spacing: -0.01em; }
#rail-header .ver { color: var(--primary); font-weight: 500; }
#rail-header .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
#rail-stats { display: flex; flex-wrap: wrap; gap: 2px 0; padding: 10px 18px; border-bottom: 1px solid var(--line); font-size: 11px; }
.stat { min-width: 50%; }
.stat .val { color: var(--ink); font-weight: 500; }
.stat .lbl { color: var(--muted); }
#rail-search { padding: 8px 18px; border-bottom: 1px solid var(--line); }
#rail-search input {
  width:100%; background:var(--bg); border:1px solid var(--line); border-radius:4px;
  padding:5px 8px; color:var(--ink); font-size:12px; outline:none;
}
#rail-search input:focus { border-color:var(--primary); }
#rail-list {
  flex:1; overflow-y: auto; padding: 4px 0;
}
.rail-item {
  padding: 6px 18px; cursor: pointer; display: flex; align-items: center;
  gap: 8px; border-left: 2px solid transparent; transition: none;
  font-size: 12px;
}
.rail-item:hover { background: var(--panel-raised); }
.rail-item.active { border-left-color: var(--primary); background: var(--panel-raised); }
.rail-item .icon { width:6px; height:6px; border-radius:50%; min-width:6px; }
.rail-item .name { color: var(--ink); }
.rail-item .meta { color: var(--muted); font-size: 11px; margin-left: auto; }
.rail-section {
  padding: 8px 18px 4px; font-size: 10px; font-weight: 600;
  color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em;
}

/* ── Main ── */
#main {
  flex:1; display: flex; flex-direction: column; overflow: hidden;
}
#graph-area {
  flex:1; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
#graph-svg { width:100%; height:100%; }
.node-bg { fill: var(--panel-raised); stroke: var(--line); stroke-width:1; cursor:pointer; transition: stroke 0.15s; }
.node-bg:hover { stroke: var(--primary); }
.node-bg.active { stroke: var(--primary); stroke-width:2; }
.node-label { fill: var(--ink); font-size: 11px; text-anchor: middle; dominant-baseline: central; pointer-events:none; }
.node-sublabel { fill: var(--muted); font-size: 9px; text-anchor: middle; dominant-baseline: central; pointer-events:none; }
.edge-line { stroke: var(--line); stroke-width:1; fill:none; }
.edge-line.calls { stroke: var(--accent); opacity:0.4; }
.edge-arrow { fill: var(--line); }
#graph-hint {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: var(--muted); background: var(--panel); padding: 4px 12px;
  border-radius: 4px; border: 1px solid var(--line); white-space: nowrap;
}

/* ── Detail ── */
#detail {
  width: 0; overflow: hidden; background: var(--panel);
  border-left: 1px solid var(--line); transition: width 0.2s;
  display: flex; flex-direction: column;
}
#detail.open { width: 380px; min-width: 380px; }
#detail-header {
  padding: 14px 18px; border-bottom: 1px solid var(--line);
  display: flex; justify-content: space-between; align-items: center;
}
#detail-header h2 { font-size: 14px; font-weight: 600; }
#detail-close { background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px; padding:0 4px; }
#detail-close:hover { color:var(--ink); }
#detail-body { flex:1; overflow-y: auto; padding: 14px 18px; font-size: 12px; line-height: 1.6; }
#detail-body h3 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin: 14px 0 6px; }
#detail-body h3:first-child { margin-top:0; }
#detail-body .kv { display: flex; gap: 8px; padding: 2px 0; }
#detail-body .kv dt { color: var(--muted); min-width: 90px; }
#detail-body .kv dd { color: var(--ink); }
#detail-body code { background: var(--bg); padding: 1px 5px; border-radius: 3px; font-size: 11px; color: var(--accent); }
#detail-body .tag { display: inline-block; padding: 1px 8px; border-radius: 3px; font-size: 10px; font-weight: 500; margin: 1px; }
.tag-py { background: #1a304a; color: var(--blue); }
.tag-cli { background: #2a1a3a; color: var(--purple); }
.tag-core { background: #1b3a24; color: var(--accent); }
.tag-config { background: #3a2e1a; color: #d29922; }

/* ── Responsive tweaks ── */
@media (max-width: 900px) {
  #rail { width: 200px; min-width: 200px; }
  #detail.open { width: 300px; min-width: 300px; }
}
</style>
</head>
<body>

<!-- Rail -->
<div id="rail">
  <div id="rail-header">
    <h1>farewell-helper <span class="ver">v5</span></h1>
    <div class="sub">OpenCode · 9Router · skills · persona</div>
  </div>
  <div id="rail-stats">
    <div class="stat"><span class="val" id="st-files">39</span> <span class="lbl">files</span></div>
    <div class="stat"><span class="val" id="st-loc">3,043</span> <span class="lbl">LOC</span></div>
    <div class="stat"><span class="val" id="st-modules">23</span> <span class="lbl">modules</span></div>
    <div class="stat"><span class="val" id="st-cmds">17</span> <span class="lbl">commands</span></div>
  </div>
  <div id="rail-search"><input id="filter" placeholder="Filter modules..." oninput="filterList(this.value)"></div>
  <div id="rail-list"></div>
</div>

<!-- Main -->
<div id="main">
  <div id="graph-area">
    <svg id="graph-svg"></svg>
    <div id="graph-hint">click a node to inspect · drag to pan (soon)</div>
  </div>
</div>

<!-- Detail -->
<div id="detail">
  <div id="detail-header">
    <h2 id="detail-title"></h2>
    <button id="detail-close" onclick="closeDetail()">✕</button>
  </div>
  <div id="detail-body"></div>
</div>

<script>
// ── Data ──
const DATA = {
  modules: [
    { id:"__init__", name:"__init__.py", path:"farewell_helper/", loc:2, type:"core", purpose:"Package init + version", exports:["__version__"], deps:[], depsBy:[], icon:"core" },
    { id:"__main__", name:"__main__.py", path:"farewell_helper/", loc:2, type:"core", purpose:"CLI entry", exports:["main()"], deps:["commands"], depsBy:[], icon:"core" },
    { id:"config", name:"config.py", path:"farewell_helper/", loc:27, type:"core", purpose:"Global paths + env + persona list", exports:["ROOT_DIR","get_api_key()","router_base_url()","persona_files()"], deps:[], depsBy:["router_client","sync","mcp","verify","archetype","setup_project","commands*"], icon:"core" },
    { id:"helpers", name:"helpers.py", path:"farewell_helper/", loc:43, type:"core", purpose:"CLI output: ok/fail/warn/info/c", exports:["c()","ok()","fail()","warn()","info()"], deps:[], depsBy:["*"], icon:"core" },
    { id:"router_client", name:"router_client.py", path:"farewell_helper/", loc:44, type:"core", purpose:"9Router HTTP: chat, models, ping", exports:["chat()","models()","ping()"], deps:["config"], depsBy:["verify","commands*"], icon:"core" },
    { id:"sync", name:"sync.py", path:"farewell_helper/", loc:37, type:"core", purpose:"Combos -> template resolver", exports:["render()"], deps:["config"], depsBy:["commands*"], icon:"core" },
    { id:"mcp", name:"mcp.py", path:"farewell_helper/", loc:118, type:"core", purpose:"MCP JSON-RPC 2.0 server (4 tools)", exports:["main()","serve()"], deps:["config"], depsBy:[], icon:"core" },
    { id:"verify", name:"verify.py", path:"farewell_helper/", loc:80, type:"core", purpose:"Persona+config+skills+9Router verify", exports:["verify()"], deps:["config","router_client"], depsBy:["commands*"], icon:"core" },
    { id:"archetype", name:"archetype.py", path:"farewell_helper/", loc:153, type:"domain", purpose:"Stack detection from file markers", exports:["detect()","save_archetype()"], deps:["config"], depsBy:["setup_project","task_planner","commands*"], icon:"domain" },
    { id:"context_manager", name:"context_manager.py", path:"farewell_helper/", loc:76, type:"domain", purpose:"AUTO-GLOSSARY.md per project", exports:["add_glossary_term()","context_content()"], deps:["config"], depsBy:["setup_project","commands*"], icon:"domain" },
    { id:"cache_monitor", name:"cache_monitor.py", path:"farewell_helper/", loc:191, type:"domain", purpose:"Token tracking + context budget", exports:["get_daily_stats()","get_session_context_budget()"], deps:["config"], depsBy:[], icon:"domain" },
    { id:"pre_commit", name:"pre_commit.py", path:"farewell_helper/", loc:36, type:"domain", purpose:"pytest + TODO/FIXME scanner", exports:["check()"], deps:["config"], depsBy:["commands*"], icon:"domain" },
    { id:"setup_project", name:"setup_project.py", path:"farewell_helper/", loc:176, type:"domain", purpose:"External repo registration + .farewell inject", exports:["analyze()","update_metadata()"], deps:["config","archetype","context_manager"], depsBy:["commands*"], icon:"domain" },
    { id:"task_planner", name:"task_planner.py", path:"farewell_helper/", loc:167, type:"domain", purpose:"Goal -> tickets decomposition", exports:["classify_goal()","decompose()"], deps:["config","archetype"], depsBy:[], icon:"domain" },
    { id:"core_io", name:"core/io.py", path:"farewell_helper/core/", loc:25, type:"core", purpose:"Atomic JSON read/write", exports:["read_json()","write_json()"], deps:[], depsBy:["core_memory","core_session"], icon:"core" },
    { id:"core_memory", name:"core/memory.py", path:"farewell_helper/core/", loc:68, type:"core", purpose:"MEMORY.md + USER.md per project", exports:["memory_content()","save_memory()"], deps:["config","core_io"], depsBy:["commands*"], icon:"core" },
    { id:"core_session", name:"core/session.py", path:"farewell_helper/core/", loc:79, type:"core", purpose:"Session lifecycle + handoff", exports:["start_session()","generate_handoff()"], deps:["config","core_io"], depsBy:["commands*"], icon:"core" },
    { id:"core_learning", name:"core/learning.py", path:"farewell_helper/core/", loc:133, type:"domain", purpose:"Pattern extraction from handoffs", exports:["detect_patterns()","auto_extract()"], deps:["config"], depsBy:[], icon:"domain" },
    { id:"commands_init", name:"commands/__init__.py", path:"farewell_helper/commands/", loc:301, type:"cli", purpose:"Argparse -> 17 subcommands", exports:["main()"], deps:["config","sync","verify","router_client","pre_commit","archetype","setup_project","project","plan","state","handoff_cmd","notes_cmd","memory","core/*"], depsBy:[], icon:"cli" },
    { id:"commands_state", name:"commands/state.py", path:"farewell_helper/commands/", loc:102, type:"cli", purpose:"status, verify, health commands", exports:["status()","verify()","health()"], deps:["config","verify","router_client","project"], depsBy:["commands_init"], icon:"cli" },
    { id:"commands_plan", name:"commands/plan.py", path:"farewell_helper/commands/", loc:194, type:"cli", purpose:"todo + done (auto-compress)", exports:["todo()","done()"], deps:["config","project","core/*","pre_commit"], depsBy:["commands_init"], icon:"cli" },
    { id:"commands_project", name:"commands/project.py", path:"farewell_helper/commands/", loc:164, type:"cli", purpose:"Project registry: CRUD + active", exports:["cmd_project()","get_active()","set_active()"], deps:["config","archetype","setup_project"], depsBy:["commands_init","commands/state","commands/plan","commands/handoff_cmd"], icon:"cli" },
    { id:"commands_handoff", name:"commands/handoff_cmd.py", path:"farewell_helper/commands/", loc:81, type:"cli", purpose:"Handoff CRUD + search/export", exports:["handoff()"], deps:["config","core/*","project"], depsBy:["commands_init"], icon:"cli" },
    { id:"commands_notes", name:"commands/notes_cmd.py", path:"farewell_helper/commands/", loc:27, type:"cli", purpose:"Glossary show/add", exports:["notes()"], deps:["context_manager"], depsBy:["commands_init"], icon:"cli" },
    { id:"commands_memory", name:"commands/memory.py", path:"farewell_helper/commands/", loc:90, type:"cli", purpose:"Memory show/edit/save + sessions", exports:["cmd_memory()","cmd_sessions()"], deps:["core/*"], depsBy:["commands_init"], icon:"cli" }
  ],
  commands: [
    { name:"sync", desc:"Sync combos -> resolve config" },
    { name:"daily", desc:"Verify -> sync -> health" },
    { name:"status", desc:"Current state" },
    { name:"verify", desc:"Verify persona + skill + 9Router" },
    { name:"start", desc:"Validate persona + project" },
    { name:"init", desc:"Bootstrap: verify + sync + health" },
    { name:"memory", desc:"View/edit MEMORY.md + USER.md" },
    { name:"sessions", desc:"Session history" },
    { name:"setup-project", desc:"Register external repo" },
    { name:"notes", desc:"Manage glossary" },
    { name:"handoff", desc:"Show/save/list/search/export" },
    { name:"project", desc:"List/switch/unregister/status" },
    { name:"pre-commit", desc:"Quality gate" },
    { name:"todo", desc:"TODO.md CRUD" },
    { name:"done", desc:"Auto-compress: commit+push+handoff" },
    { name:"health", desc:"Full health report" }
  ]
};

// ── Graph layout ──
const PILLARS = [
  { id:"opencode", label:"OpenCode", color:"var(--accent)", modules:["mcp","commands_init","commands_state","commands_plan","commands_project","commands_handoff","commands_notes","commands_memory"], x:0.5, y:0.08 },
  { id:"ninerouter", label:"9Router", color:"var(--blue)", modules:["router_client","sync","verify"], x:0.15, y:0.45 },
  { id:"skills", label:"Skills", color:"var(--purple)", modules:["archetype","task_planner","context_manager","cache_monitor","pre_commit","setup_project","core_learning"], x:0.85, y:0.45 },
  { id:"persona", label:"Persona", color:"#d29922", modules:["config","helpers","core_io","core_memory","core_session","__init__","__main__"], x:0.5, y:0.82 }
];

const NODE_W = 130, NODE_H = 32;
let selectedId = null;

function layout() {
  const modules = DATA.modules;
  const modMap = {};
  modules.forEach(m => modMap[m.id] = m);
  PILLARS.forEach(p => {
    p.modules.forEach((mid, i) => {
      const row = Math.floor(i / 3), col = i % 3;
      const count = p.modules.length;
      const cols = Math.min(count, 3);
      const startX = p.x - (cols-1) * 0.11;
      m = modMap[mid];
      if (m) { m._px = startX + col * 0.11; m._py = p.y + row * 0.075; m._pillar = p.id; }
    });
  });
  return modMap;
}

function renderGraph() {
  const svg = document.getElementById('graph-svg');
  const W = svg.clientWidth || 900, H = svg.clientHeight || 600;
  const pad = 80;
  const modMap = layout();
  const modules = DATA.modules;

  let html = `<defs><marker id="arrow" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="4" markerHeight="4" orient="auto"><path d="M0,0 L6,3 L0,6" class="edge-arrow"/></marker></defs>`;

  // Edges
  const edgeSet = new Set();
  modules.forEach(m => {
    (m.deps || []).forEach(d => {
      const targetId = d.replace('*','').trim();
      const target = modMap[targetId] || modMap[Object.keys(modMap).find(k => k.startsWith(targetId))];
      if (target && m._px && target._px) {
        const key = [m.id, target.id].sort().join('>');
        if (!edgeSet.has(key)) {
          edgeSet.add(key);
          const x1 = m._px * (W-2*pad) + pad, y1 = m._py * (H-2*pad) + pad;
          const x2 = target._px * (W-2*pad) + pad, y2 = target._py * (H-2*pad) + pad;
          const dx = x2-x1, dy = y2-y1;
          const len = Math.sqrt(dx*dx+dy*dy);
          const off = NODE_H/2 + 4;
          const nx = dx/len * off, ny = dy/len * off;
          html += `<line x1="${x1+nx}" y1="${y1+ny}" x2="${x2-nx}" y2="${y2-ny}" class="edge-line" marker-end="url(#arrow)"/>`;
        }
      }
    });
  });

  // Nodes
  modules.forEach(m => {
    if (!m._px) return;
    const x = m._px * (W-2*pad) + pad - NODE_W/2;
    const y = m._py * (H-2*pad) + pad - NODE_H/2;
    const active = selectedId === m.id;
    html += `<g class="node" data-id="${m.id}" onclick="selectNode('${m.id}')" style="cursor:pointer">`;
    html += `<rect class="node-bg ${active?'active':''}" x="${x}" y="${y}" width="${NODE_W}" height="${NODE_H}" rx="4"/>`;
    const short = m.name.replace('.py','');
    html += `<text class="node-label" x="${x+NODE_W/2}" y="${y+NODE_H/2-3}">${short}</text>`;
    html += `<text class="node-sublabel" x="${x+NODE_W/2}" y="${y+NODE_H/2+11}">${m.loc} LOC</text>`;
    html += `</g>`;
  });

  // Pillar labels
  PILLARS.forEach(p => {
    const x = p.x * (W-2*pad) + pad;
    const y = p.y * (H-2*pad) + pad - 40;
    html += `<text x="${x}" y="${y}" text-anchor="middle" fill="${p.color}" font-size="10" font-weight="600" text-transform="uppercase" letter-spacing="0.1em" opacity="0.6">${p.label}</text>`;
  });

  svg.innerHTML = html;
}

// ── Rail list ──
function renderRail(filter) {
  const el = document.getElementById('rail-list');
  const f = (filter||'').toLowerCase();
  let html = '';
  const sections = [
    { label:'CLI Commands', items: DATA.commands.map(c => ({ id:'cmd:'+c.name, name:c.name, meta:'', desc:c.desc, icon:'cli', section:'cmd' })) },
    { label:'Core Modules', items: DATA.modules.filter(m => m.icon==='core').map(m => ({ id:m.id, name:m.name, meta:m.loc+' LOC', desc:m.purpose, icon:'core', section:'mod' })) },
    { label:'Domain Modules', items: DATA.modules.filter(m => m.icon==='domain').map(m => ({ id:m.id, name:m.name, meta:m.loc+' LOC', desc:m.purpose, icon:'domain', section:'mod' })) },
    { label:'Commands', items: DATA.modules.filter(m => m.icon==='cli').map(m => ({ id:m.id, name:m.name, meta:m.loc+' LOC', desc:m.purpose, icon:'cli', section:'mod' })) }
  ];
  sections.forEach(s => {
    const items = s.items.filter(i => !f || i.name.toLowerCase().includes(f) || (i.desc||'').toLowerCase().includes(f));
    if (!items.length) return;
    html += `<div class="rail-section">${s.label}</div>`;
    items.forEach(i => {
      const active = selectedId === i.id;
      html += `<div class="rail-item ${active?'active':''}" onclick="selectNode('${i.id}')">`;
      const ic = { cli:'var(--primary)', core:'var(--accent)', domain:'var(--purple)', cmd:'var(--blue)' }[i.icon] || 'var(--muted)';
      html += `<span class="icon" style="background:${ic}"></span>`;
      html += `<span class="name">${i.name}</span>`;
      if (i.meta) html += `<span class="meta">${i.meta}</span>`;
      html += `</div>`;
    });
  });
  el.innerHTML = html;
}

function filterList(v) { renderRail(v); }

// ── Detail panel ──
function selectNode(id) {
  selectedId = id;
  renderRail(document.getElementById('filter').value);
  renderGraph();

  const detail = document.getElementById('detail');
  const title = document.getElementById('detail-title');
  const body = document.getElementById('detail-body');

  // Command detail
  if (id.startsWith('cmd:')) {
    const cmd = DATA.commands.find(c => 'cmd:'+c.name === id);
    if (!cmd) return;
    detail.classList.add('open');
    title.textContent = cmd.name;
    body.innerHTML = `
      <div class="kv"><dt>Command</dt><dd><code>farewell-helper ${cmd.name}</code></dd></div>
      <div class="kv"><dt>Description</dt><dd>${cmd.desc}</dd></div>
    `;
    return;
  }

  // Module detail
  const m = DATA.modules.find(x => x.id === id);
  if (!m) return;
  detail.classList.add('open');
  title.textContent = m.name;
  const tagClass = { core:'tag-core', cli:'tag-cli', domain:'tag-py', config:'tag-config' }[m.icon] || 'tag-core';
  let html = `<div><span class="tag ${tagClass}">${m.icon}</span></div>`;
  html += `<div class="kv"><dt>Path</dt><dd><code>${m.path}${m.name}</code></dd></div>`;
  html += `<div class="kv"><dt>LOC</dt><dd>${m.loc}</dd></div>`;
  html += `<div class="kv"><dt>Purpose</dt><dd>${m.purpose}</dd></div>`;

  if (m.exports && m.exports.length) {
    html += `<h3>Exports</h3>`;
    m.exports.forEach(e => { html += `<div><code>${e}</code></div>`; });
  }

  if (m.deps && m.deps.length) {
    html += `<h3>Depends On</h3>`;
    m.deps.forEach(d => { html += `<div><code>${d}</code></div>`; });
  }

  body.innerHTML = html;
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  selectedId = null;
  renderRail();
  renderGraph();
}

// ── Init ──
window.addEventListener('resize', renderGraph);
renderRail();
renderGraph();
</script>
</body>
</html>
